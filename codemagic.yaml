workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "Recall.xcworkspace"
        XCODE_SCHEME: "Recall"
        BUNDLE_ID: "com.shoas.recall"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Expo prebuild (generate ios/)
        script: |
          npx expo prebuild --platform ios --clean --no-install
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Revoke all existing iOS distribution certificates (clean slate)
        script: |
          echo "=== Listing existing distribution certificates ==="
          app-store-connect certificates list --type IOS_DISTRIBUTION --json > /tmp/certs.json
          echo "--- Raw JSON ---"
          cat /tmp/certs.json
          echo "--- Extracted cert IDs ---"
          # jq で配列 / {data:[...]} の両方の形式に対応
          CERT_IDS=$(jq -r 'if type == "array" then .[].id else .data[].id end' /tmp/certs.json 2>/dev/null || echo "")
          echo "Cert IDs found: '$CERT_IDS'"
          for cert_id in $CERT_IDS; do
            echo "Revoking certificate: $cert_id"
            app-store-connect certificates revoke "$cert_id" && echo "OK: $cert_id revoked" || echo "FAILED to revoke $cert_id"
          done
          echo "=== Verifying all revoked ==="
          app-store-connect certificates list --type IOS_DISTRIBUTION --json | head -50
      - name: Generate private key for certificate
        script: |
          openssl genrsa -out /tmp/cert_key.pem 2048
      - name: Fetch signing files (creates cert + profile with our key)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing in Xcode project
        script: |
          cd ios && xcode-project use-profiles --warn-only
      - name: Set build number (Codemagic counter + offset to skip past Apple history)
        script: |
          # Codemagic の BUILD_NUMBER は workflow 単位で自動インクリメント
          # +100 オフセットで EAS 時代に Apple 側に残った buildNumber 5 などを確実にスキップ
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 100))
          echo "Setting iOS bundle version to: $NEW_BUILD_NUMBER (Codemagic BUILD_NUMBER=$BUILD_NUMBER)"
          cd ios && agvtool new-version -all $NEW_BUILD_NUMBER
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
