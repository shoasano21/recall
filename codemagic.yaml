workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "Recall.xcworkspace"
        XCODE_SCHEME: "Recall"
        BUNDLE_ID: "com.shoas.recall"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Expo prebuild (generate ios/)
        script: |
          npx expo prebuild --platform ios --clean --no-install
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Revoke all existing iOS distribution certificates (clean slate)
        script: |
          # 過去ビルドで作られた孤児証明書を全消ししてからやり直す
          CERT_IDS=$(app-store-connect list-certificates --type IOS_DISTRIBUTION --json | python3 -c "import json, sys; print(' '.join([c['id'] for c in json.load(sys.stdin)]))" 2>/dev/null || echo "")
          for cert_id in $CERT_IDS; do
            echo "Revoking certificate $cert_id"
            app-store-connect revoke-certificate "$cert_id" || true
          done
      - name: Create new iOS distribution certificate
        script: |
          app-store-connect create-certificate \
            --type IOS_DISTRIBUTION \
            --save
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing in Xcode project
        script: |
          xcode-project use-profiles
      - name: Set build number from TestFlight
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          cd ios && agvtool new-version -all $NEW_BUILD_NUMBER
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
